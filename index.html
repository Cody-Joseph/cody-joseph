<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cody // Joseph</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="masthead">
    <div class="mark">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="8" cy="12" r="6" stroke="#00c900" stroke-width="1.4"/>
        <circle cx="16" cy="12" r="6" stroke="#2f9bff" stroke-width="1.4"/>
      </svg>
      one page, one match
    </div>
    <h1><span class="c">Cody</span><span class="slash">/</span><span class="j">Joseph</span></h1>
    <p>Everything below the line is edited independently. It's one file each.</p>
  </header>

  <main class="split">
    <div class="seam" aria-hidden="true"></div>
    <div class="seam-mark" aria-hidden="true">
      <div class="pulse"></div>
      <span class="vs-text">VS</span>
    </div>

    <section id="cody-half" class="half">
      <div class="glow" aria-hidden="true"></div>
      <div class="half-content" id="cody-content">
        <p style="color:var(--text-dim);font-family:var(--font-mono);font-size:12px;">loading…</p>
      </div>
    </section>

    <section id="joseph-half" class="half">
      <div class="glow" aria-hidden="true"></div>
      <div class="half-content" id="joseph-content">
        <p style="color:var(--text-dim);font-family:var(--font-mono);font-size:12px;">loading…</p>
      </div>
    </section>
  </main>

  <footer>maintained separately &middot; settled on the seam</footer>

  <script src="script.js"></script>
</body>
</html>
